        text: "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ , مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ , أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا , اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ.",
        note: "ذكر طيب.",
        maxCount: 1,

    {

        note: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ.",

        currentCount: 100
    },
    {
        text: "أسْتَغْفِرُ اللهَ وَأتُوبُ إلَيْهِ",
        note: "مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان حتى يمسى.",
        maxCount: 100,
        currentCount: 100
    }
];

        function renderAzkar() {
            const container = document.getElementById('azkar-container');
            container.innerHTML = '';
            
            azkarData.forEach((zekr, index) => {
                const isDone = zekr.currentCount === 0;
                const cardClass = isDone ? 'opacity-50 grayscale bg-gray-50 border-gray-200' : 'bg-white border-emerald-200 hover:border-emerald-400';
                const counterClass = isDone ? 'bg-gray-400' : 'bg-emerald-600';
                
                const titleHtml = zekr.title ? `<div class="text-emerald-700 font-bold text-center mb-3 text-lg">${zekr.title}</div>` : '';
                const noteHtml = zekr.note ? `<div class="mt-4 bg-emerald-50 border-r-4 border-emerald-500 p-3 rounded-md text-emerald-800 text-sm italic">${zekr.note}</div>` : '';

                container.innerHTML += `
                    <div class="rounded-xl shadow-md border overflow-hidden transition-all duration-300 ${cardClass}">
                        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto]">
                            <div class="p-6 cursor-pointer clickable-area select-none" onclick="decrement(${index})">
                                ${titleHtml}
                                <p class="text-gray-900 text-justify leading-loose text-xl">${zekr.text}</p>
                                ${noteHtml}
                            </div>
                            <div class="${counterClass} text-white flex md:flex-col items-center justify-between md:justify-center gap-3 p-4 md:min-w-[110px]">
                                <div class="text-center">
                                    <div class="text-3xl font-bold">${zekr.currentCount}</div>
                                    <div class="text-emerald-100 text-xs mt-1">من ${zekr.maxCount}</div>
                                </div>
                                <button onclick="reset(${index}, event)" class="bg-black/20 hover:bg-black/30 px-3 py-1 rounded text-xs">إعادة</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function decrement(index) {
            if (azkarData[index].currentCount > 0) {
                azkarData[index].currentCount--;
                renderAzkar();
            }
        }

        function reset(index, event) {
            event.stopPropagation();
            azkarData[index].currentCount = azkarData[index].maxCount;
            renderAzkar();
        }

        renderAzkar();
    </script>
</body>
</html>
