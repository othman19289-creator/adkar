    <style>
        body { font-family: 'Amiri', serif; background-color: #f0fdf4; }

</head>
<body class="p-4 md:p-8">
	
    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-bold text-emerald-800 mb-2">أتسابيح</h1>
		<p class="text-emerald-600">حصن المسلم - المصدر: إسلام بوك</p>
        <a href="https://adkaralmusliam.github.io/adkaralmusliam/" 
   class="fixed top-4 right-4 z-50 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 transition-all duration-300 group">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
    </svg>
    <span class="font-bold">الرجوع للرئيسية</span>
</a>
    </header>

    <main id="azkar-container" class="max-w-4xl mx-auto space-y-4">
        </main>

    <script>
        // قاعدة بيانات أذكار المساء من موقع إسلام بوك
        const azkarData = [
    {
        text: "سُبْحَانَ اللَّهِ",
        note: "يكتب له ألف حسنة أو يحط عنه ألف خطيئة.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
        note: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ. لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ إِلَّا أَحَدٌ قَالَ مِثْلَ مَا قَالَ أَوْ زَادَ عَلَيْهِ.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ",
        note: "تملآن ما بين السماوات والأرض.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ اللهِ العَظِيمِ وَبِحَمْدِهِ",
        note: "غرست له نخلة في الجنة.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ، سُبْحَانَ اللَّهِ الْعَظِيمِ",
        note: "ثقيلتان في الميزان حبيبتان إلى الرحمن.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءِ قَدِيرِ.",
        note: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "الْحَمْدُ للّهِ رَبِّ الْعَالَمِينَ",
        note: "تملأ ميزان العبد بالحسنات.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "لا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ",
        note: "كنز من كنوز الجنة.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "الْلَّهُم صَلِّ وَسَلِم وَبَارِك عَلَى سَيِّدِنَا مُحَمَّد",
        note: "من صلى علي حين يصبح وحين يمسى ادركته شفاعتي يوم القيامة.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "أستغفر الله",
        note: "لفعل الرسول صلى الله عليه وسلم والاقتداء به.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ الْلَّهِ، وَالْحَمْدُ لِلَّهِ، وَلَا إِلَهَ إِلَّا الْلَّهُ، وَالْلَّهُ أَكْبَرُ",
        note: "أحب الكلام إلى الله، ومكفرات للذنوب، وغرس الجنة، والْبَاقِيَاتُ الْصَّالِحَات.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "لَا إِلَهَ إِلَّا اللَّهُ",
        note: "أفضل الذكر لا إله إلاّ الله.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "الْلَّهُ أَكْبَرُ",
        note: "كتبت له عشرون حسنة وحطت عنه عشرون سيئة. الله أكبر من كل شيء.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "سُبْحَانَ اللَّهِ ، وَالْحَمْدُ لِلَّهِ ، وَلا إِلَهَ إِلا اللَّهُ ، وَاللَّهُ أَكْبَرُ ، اللَّهُمَّ اغْفِرْ لِي ، اللَّهُمَّ ارْحَمْنِي ، اللَّهُمَّ ارْزُقْنِي.",
        note: "جامعة لخير الدنيا والآخرة.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "الْحَمْدُ لِلَّهِ حَمْدًا كَثِيرًا طَيِّبًا مُبَارَكًا فِيهِ.",
        note: "رأى النبي ﷺ اثني عشر ملكاً يبتدرونها أيهم يرفعها.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "اللَّهُ أَكْبَرُ كَبِيرًا ، وَالْحَمْدُ لِلَّهِ كَثِيرًا ، وَسُبْحَانَ اللَّهِ بُكْرَةً وَأَصِيلاً.",
        note: "عجب لها النبي ﷺ وقال: فُتحت لها أبواب السماء.",
        maxCount: 100,
        currentCount: 100
    },
    {
        text: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ , وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ , اللَّهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ.",
        note: "تحط عنه عشر خطايا ويرفع له عشر درجات ويصلي الله عليه عشرا.",
        maxCount: 100,
        currentCount: 100
    }
];
        function renderAzkar() {
            const container = document.getElementById('azkar-container');
            container.innerHTML = '';
            
            azkarData.forEach((zekr, index) => {
                const isDone = zekr.currentCount === 0;
                const cardClass = isDone ? 'opacity-50 grayscale bg-gray-50 border-gray-200' : 'bg-white border-emerald-200 hover:border-emerald-400';
                const counterClass = isDone ? 'bg-gray-400' : 'bg-emerald-600';
                
                const titleHtml = zekr.title ? `<div class="text-emerald-700 font-bold text-center mb-3 text-lg">${zekr.title}</div>` : '';
                const noteHtml = zekr.note ? `<div class="mt-4 bg-emerald-50 border-r-4 border-emerald-500 p-3 rounded-md text-emerald-800 text-sm italic">${zekr.note}</div>` : '';

                container.innerHTML += `
                    <div class="rounded-xl shadow-md border overflow-hidden transition-all duration-300 ${cardClass}">
                        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto]">
                            <div class="p-6 cursor-pointer clickable-area select-none" onclick="decrement(${index})">
                                ${titleHtml}
                                <p class="text-gray-900 text-justify leading-loose text-xl">${zekr.text}</p>
                                ${noteHtml}
                            </div>
                            <div class="${counterClass} text-white flex md:flex-col items-center justify-between md:justify-center gap-3 p-4 md:min-w-[110px]">
                                <div class="text-center">
                                    <div class="text-3xl font-bold">${zekr.currentCount}</div>
                                    <div class="text-emerald-100 text-xs mt-1">من ${zekr.maxCount}</div>
                                </div>
                                <button onclick="reset(${index}, event)" class="bg-black/20 hover:bg-black/30 px-3 py-1 rounded text-xs">إعادة</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function decrement(index) {
            if (azkarData[index].currentCount > 0) {
                azkarData[index].currentCount--;
                renderAzkar();
            }
        }

        function reset(index, event) {
            event.stopPropagation();
            azkarData[index].currentCount = azkarData[index].maxCount;
            renderAzkar();
        }

        renderAzkar();
    </script>
</body>
</html>
